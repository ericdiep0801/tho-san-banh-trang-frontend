<header class="premium-header glass-effect" [class.explore-mode]="isExploreRoute">
  <div class="header-container">

    <!-- Left: Hamburger + Logo -->
    <div class="header-left">
      <button class="hamburger" (click)="toggleMenu()">
        <span></span><span></span><span></span>
      </button>
      <a class="logo" routerLink="/">
        <span class="logo-text">Thợ Săn Bánh Tráng</span>
      </a>
    </div>

    <!-- Center: Search -->
    <div class="header-center" *ngIf="!isExploreRoute">
      <div class="search-wrapper">

          placeholder="Bạn thèm bánh tráng gì hôm nay?">
        <button class="btn-search" (click)="search()">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
      </div>
    </div>

        -->

        <!-- Tạm ẩn tính năng mua hàng
        <a routerLink="/products" routerLinkActive="active" (click)="toggleMenu()">Sản Phẩm</a>
        -->
      </nav>

<!-- Scroll to Top Button -->
<button class="scroll-to-top" [class.show]="showScrollToTop" (click)="scrollToTop()">
  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="12" y1="19" x2="12" y2="5"></line>
    <polyline points="5 12 12 5 19 12"></polyline>
  </svg>
</button>

<!-- Global Modals -->
<app-auth-modal *ngIf="showLoginModal" (close)="showLoginModal = false"></app-auth-modal>
<app-profile-modal *ngIf="showProfileModal" (close)="showProfileModal = false"></app-profile-modal>

<!-- Toast Notifications -->
<div class="toast-container">
  <div *ngFor="let toast of toasts" class="toast" [ngClass]="toast.type">
    <svg *ngIf="toast.type === 'success'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
    <svg *ngIf="toast.type === 'error'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
    <span>{{ toast.message }}</span>
    <button class="toast-close" (click)="removeToast(toast.id)">×</button>
  </div>
</div>
