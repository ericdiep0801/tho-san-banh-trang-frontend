<div class="page-container">
  <h1 class="page-title">Thanh Toán & Đặt Hàng</h1>

  <div class="checkout-layout">
    <div class="checkout-form glass-card">
      <h3>Thông tin giao hàng</h3>
      
      <div class="form-group">
        <label>Địa chỉ nhận hàng (*)</label>
        <textarea [(ngModel)]="address" rows="3" placeholder="Số nhà, Tên đường, Phường/Xã, Quận/Huyện..." class="form-control"></textarea>
      </div>

      <div class="form-group">
        <label>Ghi chú đơn hàng (Tùy chọn)</label>
        <textarea [(ngModel)]="notes" rows="2" placeholder="Ví dụ: Giao giờ hành chính, gọi trước khi giao..." class="form-control"></textarea>
      </div>
      
      <p class="hint">Thanh toán tiền mặt khi nhận hàng (COD).</p>
    </div>

    <div class="checkout-summary glass-card">
      <h3>Đơn hàng của bạn</h3>
      <div class="summary-row">
        <span>Tổng sản phẩm:</span>
        <span>{{ cartService.totalItems }}</span>
      </div>
      <div class="summary-row total">
        <span>Thành tiền:</span>
        <span>{{ cartService.totalAmount | number }}₫</span>
      </div>
      
      <button class="btn-primary full-width mt-1" (click)="placeOrder()" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Đang Xử Lý...' : 'Xác Nhận Đặt Hàng' }}
      </button>
    </div>
  </div>
</div>
