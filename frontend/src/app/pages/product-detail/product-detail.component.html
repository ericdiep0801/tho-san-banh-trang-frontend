<div class="page-container">
  <!-- Skeleton Loader -->
  <div class="product-detail-card glass-card" *ngIf="isLoading">
    <div class="img-section">
      <div class="skeleton skeleton-img" style="height: 100%; min-height: 400px;"></div>
    </div>
    
    <div class="info-section">
      <div class="skeleton skeleton-text" style="width: 30%; height: 25px;"></div>
      <div class="skeleton skeleton-text" style="width: 80%; height: 40px; margin-top: 10px;"></div>
      <div class="skeleton skeleton-text" style="width: 40%; height: 30px; margin-top: 15px;"></div>
      
      <div class="description" style="margin-top: 30px;">
        <div class="skeleton skeleton-text" style="width: 50%; margin-bottom: 15px;"></div>
        <div class="skeleton skeleton-text" style="width: 100%;"></div>
        <div class="skeleton skeleton-text" style="width: 90%;"></div>
        <div class="skeleton skeleton-text" style="width: 95%;"></div>
        <div class="skeleton skeleton-text" style="width: 70%;"></div>
      </div>

      <div class="action-section" style="margin-top: 30px;">
        <div class="skeleton skeleton-btn" style="width: 150px;"></div>
        <div class="skeleton skeleton-btn full-width" style="margin-top: 15px;"></div>
      </div>
    </div>
  </div>

  <!-- Real Content -->
  <div class="product-detail-card glass-card" *ngIf="!isLoading && product">
    <div class="img-section">
      <img [src]="product.image || 'assets/hero_bag.png'" [alt]="product.name">
    </div>
    
    <div class="info-section">
      <span class="category-tag">{{ product.category }}</span>
      <h2>{{ product.name }}</h2>
      <p class="price">{{ product.price | number }}₫</p>
      
      <div class="description">
        <h3>Mô tả sản phẩm</h3>
        <p>{{ product.description }}</p>
      </div>

      <div class="action-section">
        <div class="quantity-pill">
          <button class="qty-btn" (click)="decrease()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          </button>
          <input type="number" [(ngModel)]="quantity" min="1" class="qty-val-input">
          <button class="qty-btn" (click)="increase()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          </button>
        </div>
        
        <button class="btn-primary full-width" 
                [class.btn-loading]="isAddingToCart" 
                (click)="addToCart()" 
                [disabled]="isAddingToCart">
          <span class="btn-text">Thêm Vào Giỏ Hàng</span>
          <div class="spinner spinner-dark" *ngIf="isAddingToCart"></div>
        </button>
      </div>
    </div>
  </div>
</div>
