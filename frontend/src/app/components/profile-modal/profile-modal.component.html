<div class="modal-overlay" (click)="close.emit()">
  <div class="modal-content glass-card" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="close.emit()">×</button>
    
    <div class="profile-header">
      <div class="avatar">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>
      <h2>Tài khoản của tôi</h2>
    </div>

    <div *ngIf="user" class="profile-info">
      <!-- Highlighted Points Card -->
      <div class="points-card">
        <div class="points-details">
          <span>Hạng thành viên Bạc</span>
          <strong>{{ user.points }} <span>điểm</span></strong>
        </div>
      </div>

      <div class="info-group">
        <label>Số điện thoại</label>
        <p>{{ user.phone }}</p>
      </div>
      <div class="info-group">
        <label>Ngày tham gia</label>
        <p>{{ user.joinDate }}</p>
      </div>
    </div>

    <div class="profile-actions">
      <button class="btn-orders full-width" (click)="viewOrders()">Lịch sử mua hàng</button>
      <button class="btn-logout full-width" (click)="logout()">Đăng xuất</button>
    </div>
  </div>
</div>
